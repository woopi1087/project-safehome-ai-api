services:
  safehome-ai-api:
    image: ghcr.io/${GITHUB_OWNER}/safehome-ai-api:dev
    container_name: safehome-ai-api-dev
    env_file: /home/woopi/project/safehome/env/.env_ai_api
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - chroma-data:/app/chroma_db
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - safehome-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chroma-data:

networks:
  safehome-net:
    external: true
